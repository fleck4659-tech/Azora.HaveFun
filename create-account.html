
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Azora</title>

    <link rel="stylesheet" href="create-account.css">
</head>

<body>

<div class="account-box">

    <img src="logo.jpg" class="logo" alt="Azora Logo">

    <h1>Join Azora</h1>

    <p>Create your free Azora account.</p>

    <input
        id="username"
        type="text"
        placeholder="Username">

    <input
        id="password"
        type="password"
        placeholder="Password (10+ characters)">

    <input
        id="confirmPassword"
        type="password"
        placeholder="Confirm Password">

    <button onclick="createAccount()">
        Create Account
    </button>

    <p id="message"></p>

</div>

<script src="create-account.js"></script>

</body>
</html>
